<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Catalogue — Recherche</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 60px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 { margin-bottom: 8px; }
    p.lead { color: #666; margin-bottom: 32px; }
    form { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .suggestions a {
      background: #f3f4f6;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }
    .suggestions a:hover { background: #e5e7eb; }
  </style>
</head>
<body>
  <h1>🛍️ Catalogue produits</h1>
  <p class="lead">Cherche un produit dans le catalogue.</p>

  <form action="/resultats" method="get">
    <input type="text" name="q" placeholder="ex: smartphone, watch, shoes..." autofocus>
    <button type="submit">Rechercher</button>
  </form>

  <p style="margin-top: 32px; color: #666; font-size: 14px;">Quelques pistes :</p>
  <div class="suggestions">
    <a href="/resultats?q=phone">phone</a>
    <a href="/resultats?q=laptop">laptop</a>
    <a href="/resultats?q=watch">watch</a>
    <a href="/resultats?q=fragrance">fragrance</a>
    <a href="/resultats?q=shoes">shoes</a>
  </div>
</body>
</html>
