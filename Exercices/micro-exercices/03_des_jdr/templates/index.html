<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎲 Lanceur de dés JDR</title>
  <style>
    :root { --vert: #16a34a; --rouge: #dc2626; --violet: #7c3aed; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b, #0f172a);
      color: #f1f5f9;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }
    h1 { font-size: 2rem; margin: 0 0 4px; }
    p.lead { color: #94a3b8; margin: 0 0 28px; }
    form { display: flex; gap: 8px; width: 100%; max-width: 420px; }
    input {
      flex: 1; padding: 14px 16px; font-size: 18px;
      border: 2px solid #475569; border-radius: 10px;
      background: #1e293b; color: #f1f5f9; text-align: center;
    }
    input:focus { outline: none; border-color: var(--violet); }
    button {
      padding: 14px 22px; font-size: 18px; font-weight: 600;
      border: 0; border-radius: 10px; cursor: pointer;
      background: var(--violet); color: white;
    }
    button:hover { filter: brightness(1.15); }
    .raccourcis { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 8px; justify-content: center; }
    .raccourcis button { background: #334155; padding: 6px 12px; font-size: 14px; }
    .resultat { margin-top: 32px; text-align: center; min-height: 120px; }
    .des { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; }
    .de {
      width: 64px; height: 64px; border-radius: 12px;
      background: white; color: #0f172a;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800;
      box-shadow: 0 6px 0 #cbd5e1;
      animation: pop .35s ease;
    }
    @keyframes pop { from { transform: scale(.3) rotate(-25deg); opacity: 0; } to { transform: none; opacity: 1; } }
    .modif { font-size: 22px; color: #94a3b8; }
    .total { margin-top: 18px; font-size: 1.4rem; }
    .total b { font-size: 2.4rem; color: var(--vert); display: block; }
    .detail { color: #94a3b8; font-size: 14px; margin-top: 6px; }
    .erreur { color: var(--rouge); font-weight: 600; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>🎲 Lanceur de dés</h1>
  <p class="lead">Tape une notation JDR : <code>2d6+3</code>, <code>d20</code>, <code>4d8-1</code>…</p>

  <form id="form">
    <input id="notation" value="2d6+3" autocomplete="off" autofocus>
    <button type="submit">Lancer</button>
  </form>

  <div class="raccourcis">
    <button type="button" data-n="d20">d20</button>
    <button type="button" data-n="2d6">2d6</button>
    <button type="button" data-n="1d6+3">1d6+3</button>
    <button type="button" data-n="4d4">4d4</button>
    <button type="button" data-n="3d8+5">3d8+5</button>
  </div>

  <div class="resultat" id="resultat"></div>

  <script>
    const form = document.getElementById("form");
    const champ = document.getElementById("notation");
    const sortie = document.getElementById("resultat");

    document.querySelectorAll(".raccourcis button").forEach(b => {
      b.addEventListener("click", () => { champ.value = b.dataset.n; form.requestSubmit(); });
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      sortie.innerHTML = "🎲 ...";
      try {
        const r = await fetch("/lancer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ notation: champ.value })
        });
        const data = await r.json();
        if (!r.ok) {
          sortie.innerHTML = `<p class="erreur">⛔ ${data.error || "erreur"}</p>`;
          return;
        }
        const des = data.lances.map(v => `<div class="de">${v}</div>`).join("");
        const mod = data.modificateur
          ? `<span class="modif">${data.modificateur > 0 ? "+" : "−"} ${Math.abs(data.modificateur)}</span>`
          : "";
        sortie.innerHTML = `
          <div class="des">${des} ${mod}</div>
          <div class="total">Total <b>${data.total}</b></div>
          <div class="detail">${data.detail}</div>`;
      } catch (err) {
        sortie.innerHTML = `<p class="erreur">⛔ serveur injoignable</p>`;
      }
    });
  </script>
</body>
</html>
