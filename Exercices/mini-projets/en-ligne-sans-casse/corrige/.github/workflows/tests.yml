# ============================================================
# .github/workflows/tests.yml — Intégration Continue (CI)
# ============================================================
# C'est la brique "CI" : à CHAQUE push (ou pull request), GitHub
# lance pytest sur une machine neuve. Si les tests cassent, tu le
# vois AVANT que Render ne déploie. C'est CE maillon qui fait passer
# "Render seul (CD)" à une vraie "démarche DevOps (CI + CD)" -> C11.
#
# Copie le dossier .github/ à la RACINE de TON repo GitHub.
# ============================================================

name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer la suite de tests
        run: pytest -v
